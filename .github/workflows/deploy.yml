name: Deploy to GitHub Pages

on:
  # Automatický deploy při push na main
  push:
    branches: [main]
  # Manuální spuštění z Actions tab
  workflow_dispatch:

# Oprávnění pro GITHUB_TOKEN — deploy na Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Zabránit souběžným deployům — poslední vždy vítězí
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
